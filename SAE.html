    <script>
        // Récupérer les éléments HTML
        const menu = document.getElementById('menu');
        const navMenu = document.getElementById('navMenu');

        // Ajouter un écouteur d'événement sur le clic du bouton menu
        menu.addEventListener('click', function() {
            // Alterner (toggle) la classe 'active' sur le bouton et le menu
            menu.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // Fermer le menu automatiquement quand on clique sur un lien
        const navLinks = document.querySelectorAll('.nav-menu');
        navLinks.forEach(function(link) {
            link.addEventListener('click', function() {
                menu.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        document.addEventListener('Loaded', function () {
