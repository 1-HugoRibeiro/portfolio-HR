<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chiant</title>
    <style>
    .chiant-page {
        min-height: 100vh;
        position: relative;
        padding-top: 100px;
        padding-bottom: 100px;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
    }

    .chiant-page::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
            radial-gradient(circle at 20% 30%, rgba(255, 193, 7, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(255, 235, 59, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 50% 50%, rgba(255, 193, 7, 0.05) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    .game-content {
        position: relative;
        z-index: 10;
        text-align: center;
        color: #FFC107;
        padding: 20px;
    }

    .game-content h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        text-shadow: 0 2px 10px rgba(255, 193, 7, 0.5), 0 0 20px rgba(255, 235, 59, 0.3);
        margin-bottom: 30px;
    }

    #counter {
        display: none !important;
    }

    #userMessage {
        font-size: 20px;
        margin-top: 15px;
        padding: 10px 20px;
        background: rgba(255, 193, 7, 0.2);
        border-radius: 10px;
        border: 2px solid #FFC107;
        color: #FFD54F;
        display: inline-block;
        max-width: 600px;
    }

    .button-wrapper {
        position: fixed;
        z-index: 9999;
        pointer-events: none;
    }

    #proximityButton {
        width: 80px;
        height: 80px;
        background-color: transparent;
        border: none;
        cursor: pointer;
        transition: transform 0.3s ease;
        font-size: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 5px;
        pointer-events: auto;
    }

    #proximityButton::before {
        content: '🐝';
    }

    #proximityButton::after {
        content: 'Attrapez-moi !';
        font-size: 10px;
        color: #FFC107;
        font-weight: 600;
    }

    #beeMessage {
        position: absolute;
        top: -40px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.9);
        color: #FFC107;
        padding: 8px 15px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: bold;
        white-space: nowrap;
        border: 2px solid #FFC107;
        box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        pointer-events: none;
    }
</style>
</head>
<body>
    <div class="chiant-page">
    <div class="game-content">
        <h1>Attrape moi si tu peux 👻</h1>
        <div id="counter" style="display: none;">Tentatives : 0 / 200</div>
        <div id="userMessage" style="display: none;"></div>
    </div>
    
    <div class="button-wrapper">
        <button id="proximityButton"></button>
        <div id="beeMessage" style="display: none;"></div>
    </div>
</div>    
</body>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userMessage = urlParams.get('message');
    
    if (userMessage) {
        document.getElementById('userMessage').textContent = `Message : "${userMessage}"`;
        document.getElementById('userMessage').style.display = 'inline-block';
        
        document.getElementById('beeMessage').textContent = userMessage;
        document.getElementById('beeMessage').style.display = 'block';
    }
    
    const button = document.getElementById('proximityButton');
    const buttonWrapper = document.querySelector('.button-wrapper');
    const counterDisplay = document.getElementById('counter');
    const proximityThreshold = 120;
    
    let buttonX = window.innerWidth / 2;
    let buttonY = window.innerHeight / 2;
    let pursuitCount = 0;
    let canMove = true;
    let hasBeenNear = false;
    
    buttonWrapper.style.left = buttonX + 'px';
    buttonWrapper.style.top = buttonY + 'px';

    document.addEventListener('mousemove', (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        
        const distanceX = mouseX - buttonX;
        const distanceY = mouseY - buttonY;
        const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
        
        if (distance < proximityThreshold && canMove) {
            if (!hasBeenNear) {
                pursuitCount++;
                hasBeenNear = true;
                
                if (pursuitCount >= 200) {
                    canMove = false;
                    button.style.backgroundColor = '#4CAF50';
                    button.innerHTML = 'Cliquez-moi maintenant !';
                    
                    buttonX = window.innerWidth / 2;
                    buttonY = window.innerHeight / 2;
                    buttonWrapper.style.left = buttonX + 'px';
                    buttonWrapper.style.top = buttonY + 'px';
                    
                    return;
                }
            }
            
            const buttonWidth = button.offsetWidth;
            const buttonHeight = button.offsetHeight;
            const margin = 20;
            
            const minX = buttonWidth / 2 + margin;
            const maxX = window.innerWidth - buttonWidth / 2 - margin;
            const minY = buttonHeight / 2 + margin + 120;
            const maxY = window.innerHeight - buttonHeight / 2 - margin;
            
            let newX, newY, newDistance;
            
            do {
                newX = minX + Math.random() * (maxX - minX);
                newY = minY + Math.random() * (maxY - minY);
                
                const dx = mouseX - newX;
                const dy = mouseY - newY;
                newDistance = Math.sqrt(dx * dx + dy * dy);
            } while (newDistance < proximityThreshold * 2);
            
            buttonX = newX;
            buttonY = newY;
            
            buttonWrapper.style.left = buttonX + 'px';
            buttonWrapper.style.top = buttonY + 'px';
        } else if (distance >= proximityThreshold * 1.5) {
            hasBeenNear = false;
        }
    });

    button.addEventListener('click', () => {
        if (!canMove) {
            let alertMessage = 'Bravo champion, tu es enfin parvenu à me toucher ! 🎉';
            if (userMessage) {
                alertMessage += `\n\nTon message était : "${userMessage}"`;
            }
            alert(alertMessage);
            pursuitCount = 0;
            canMove = true;
            hasBeenNear = false;
            button.innerHTML = '';
            button.style.backgroundColor = 'transparent';
            
            buttonX = window.innerWidth / 2;
            buttonY = window.innerHeight / 2;
            buttonWrapper.style.left = buttonX + 'px';
            buttonWrapper.style.top = buttonY + 'px';
        }
    });

    window.addEventListener('resize', () => {
        const buttonWidth = button.offsetWidth;
        const buttonHeight = button.offsetHeight;
        const margin = 10;
        
        buttonX = Math.max(buttonWidth / 2 + margin, Math.min(window.innerWidth - buttonWidth / 2 - margin, buttonX));
        buttonY = Math.max(buttonHeight / 2 + margin + 100, Math.min(window.innerHeight - buttonHeight / 2 - margin, buttonY));
        buttonWrapper.style.left = buttonX + 'px';
        buttonWrapper.style.top = buttonY + 'px';
    });
</script>
</html>
